<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" src="main.css">
    <title>Riddle Me This</title>
</head>
<body style='background-color:black;'>
  <p class='text'>
    Enter 2 digit Code:
  </p>
  <label for="fname" class="text">Here --></label>
  <input type="text" id="fname" name="fname"><br><br>
    <button class="text" onClick="checkAnswer()">Submit</button>
    <script>
        function checkAnswer(){
            var heyyyy = document.getElementById("fname").value;
            if(heyyyy == '73') {
                document.getElementById('trstan').innerHTML = 'RAKIN AND AUG CLU O BLOCK'
            }
            else{
                document.getElementById('trstan').innerHTML = 'Incorrect! Try again!'                
            }
        }
    </script>
    <p id = 'trstan'></p>
</body>
</html>
